<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple of Fortune</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: flex-start; overflow-x: hidden; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        .header-panel { width: 100%; max-width: 360px; display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; font-weight: bold; }
        .balance-box { display: flex; align-items: center; gap: 5px; }
        .balance-coin { color: #f1c40f; font-size: 16px; font-weight: bold; }
        .settings-btn { background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; padding: 0 5px; transition: color 0.2s; }
        .settings-btn:hover { color: #fff; }
        
        .game-container { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 5px; background: #262626; padding: 12px; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; position: relative; }
        .game-row-wrapper { display: flex; align-items: center; width: 100%; gap: 10px; height: 38px; }
        .coeff-box { width: 55px; background: #3d3131; border-radius: 4px; font-size: 10px; font-weight: bold; text-align: center; padding: 4px 0; color: #f3a4a4; flex-shrink: 0; border: 1px solid #4d3b3b; }
        
        .cells-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; flex-grow: 1; height: 100%; opacity: 0.2; transition: all 0.3s ease; border-radius: 6px; padding: 2px; }
        
        /* ЭФФЕКТ ГОРЕНИЯ АКТИВНОГО РЯДА */
        .cells-row.active { opacity: 1; background: rgba(52, 152, 219, 0.05); animation: neonGlow 2s infinite alternate; }
        @keyframes neonGlow {
            0% { box-shadow: 0 0 4px rgba(52,152,219,0.2), inset 0 0 4px rgba(52,152,219,0.1); }
            100% { box-shadow: 0 0 12px rgba(52,152,219,0.5), inset 0 0 8px rgba(52,152,219,0.2); }
        }
        
        .cell { height: 100%; background: #333333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.4s; border: 1px solid #444; }
        .cell.turbo-anim { transition: transform 0s !important; }
        .cell.flipped { transform: rotateY(180deg); }
        .cell .front, .cell .back { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; backface-visibility: hidden; border-radius: 3px; }
        .cell .front { background: #3d3d3d; }
        .cells-row.active .cell .front { border: 1px solid #4a90e2; }
        .cell .back { transform: rotateY(180deg); }
        
        .cell.win { background: #27ae60 !important; border-color: #2ecc71; }
        .cell.lose { background: #c0392b !important; border-color: #e74c3c; }
        
        /* АНИМАЦИЯ ВЗРЫВА ОГРЫЗКА */
        .cell.exploding { animation: cellExplode 0.4s ease-out; }
        @keyframes cellExplode {
            0% { transform: scale(1) rotateY(180deg); filter: brightness(1); }
            50% { transform: scale(1.15) rotateY(180deg); filter: brightness(1.8); background: #e74c3c !important; }
            100% { transform: scale(1) rotateY(180deg); filter: brightness(1); }
        }

        .controls { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 8px; }
        .input-row { display: flex; gap: 8px; width: 100%; }
        input { flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; font-size: 16px; text-align: center; outline: none; font-weight: bold; }
        
        /* Кнопка ТУРБО режима */
        .btn-turbo { width: 50px; background: #222; border: 1px solid #444; border-radius: 6px; color: #777; font-size: 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-turbo.active { background: #f39c12; color: #fff; border-color: #f1c40f; box-shadow: 0 0 10px rgba(241,196,15,0.4); }

        button { padding: 14px; border-radius: 6px; border: none; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
        .btn-play { background: #2ecc71; color: white; }
        .btn-cashout { background: #9b59b6; color: white; display: none; }
        .btn-bonus { background: #3498db; color: white; margin-top: 2px; font-size: 13px; padding: 10px; }
        
        /* ИСТОРИЯ ИГР */
        .history-panel { width: 100%; max-width: 360px; display: flex; align-items: center; gap: 8px; margin-top: 12px; padding: 5px; box-sizing: border-box; font-size: 11px; color: #777; font-weight: bold; }
        .history-list { display: flex; gap: 6px; flex-grow: 1; overflow: hidden; }
        .history-item { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; animation: slideIn 0.3s ease; }
        .history-item.w { background: rgba(39,174,96,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        .history-item.l { background: rgba(192,57,43,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
        @keyframes slideIn { from { transform: translateX(10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        #toast { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: #2f3542; color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: top 0.3s; z-index: 3000; font-size: 13px; text-align: center; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }
        #toast.show { top: 20px; }
        
        /* ОКНО НАСТРОЕК */
        .settings-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 1px solid #444; border-radius: 12px; padding: 20px; z-index: 2500; width: 260px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        .settings-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-size: 14px; font-weight: bold; }
        .toggle-btn { background: #333; color: #999; padding: 6px 14px; border-radius: 6px; font-size: 12px; }
        .toggle-btn.on { background: #2ecc71; color: #fff; }

        .admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 2px solid #3498db; border-radius: 12px; padding: 20px; z-index: 2000; width: 290px; box-shadow: 0 0 20px rgba(52,152,219,0.5); text-align: center; box-sizing: border-box; }
        .admin-modal h3, .settings-modal h3 { margin-top: 0; color: #3498db; font-size: 16px; text-transform: uppercase; margin-bottom: 15px; }
        .admin-modal input { width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; padding: 10px; background: #111; color: #fff; border: 1px solid #444; border-radius: 6px; text-align: center; }
        .admin-btn { background: #3498db; color: white; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .admin-close { color: #aaa; font-size: 12px; margin-top: 12px; cursor: pointer; display: block; text-decoration: underline; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 20%, 60% {transform: translateX(-6px);} 40%, 80% {transform: translateX(6px);} }
    </style>
</head>
<body>
    <div id="toast">Уведомление</div>

    <!-- ОКНО НАСТРОЕК -->
    <div class="settings-modal" id="settings-popup">
        <h3>⚙️ Настройки</h3>
        <div class="settings-row"><span>Звуковые эффекты</span><button class="toggle-btn on" id="setting-sound" onclick="toggleSetting('sound')">ВКЛ</button></div>
        <div class="settings-row"><span>Вибрация (Taptic)</span><button class="toggle-btn on" id="setting-haptic" onclick="toggleSetting('vibrate')">ВКЛ</button></div>
        <span class="admin-close" onclick="closeSettings()">Закрыть</span>
    </div>

    <div class="admin-modal" id="admin-panel">
        <h3 id="admin-title">🎁 АКТИВАЦИЯ КОДА</h3>
        <input type="text" id="promo-code" placeholder="AP-XXXXXX">
        <input type="number" id="promo-amount" placeholder="СУММА НАЧИСЛЕНИЯ" min="1" style="display: none;">
        <button class="admin-btn" id="admin-submit-btn" onclick="executePromoActivate()">АКТИВИРОВАТЬ</button>
        <span class="admin-close" onclick="closeAdminPanel()">Закрыть</span>
    </div>

    <div class="header-panel">
        <span id="secret-trigger" style="cursor: pointer;">🍏 Apple of Fortune</span>
        <div class="balance-box">
            <span class="balance-coin">$</span>
            <span id="user-balance">500.00</span>
            <button class="settings-btn" onclick="openSettings()">⚙️</button>
        </div>
    </div>

    <div class="game-container" id="game-container"></div>
    <div class="controls">
        <div class="input-row">
            <input type="number" id="bet-amount" value="10" min="10">
            <button class="btn-turbo" id="turbo-btn" onclick="toggleTurbo()" title="Турбо-режим">⚡</button>
        </div>
        <button class="btn-play" id="btn-action" onclick="startGame()">Сделать ставку</button>
        <button class="btn-cashout" id="btn-cashout" onclick="cashoutGame()">Забрать выигрыш</button>
        <button class="btn-bonus" id="btn-bonus" onclick="getBonus()">🎁 Бонус раз в час</button>
    </div>

    <!-- ПАНЕЛЬ ИСТОРИИ -->
    <div class="history-panel">
        <span>ИСТОРИЯ:</span>
        <div class="history-list" id="history-box"></div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg && typeof tg.expand === 'function') tg.expand();

        const multipliers = [1.23, 1.54, 1.93, 2.41, 4.02, 6.71, 11.18, 27.97, 69.93, 349.68];
        let currentRow = 0, gameRunning = false, gameField = [], currentBet = 10;
        let wallet = 500.0, lastBonusTime = null, adminClicks = 0, isMasterMode = false;
        
        // Новые состояния настроек
        let useSound = true, useHaptic = true, useTurbo = false;
        let gameHistory = [];

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = AudioContext ? new AudioContext() : null;

        function playSound(type) {
            if (!audioCtx || !useSound) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'apple') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.16);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'lose') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'cashout') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1174.66, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // Вызов вибрации через Telegram API
        function triggerHaptic(style = 'light') {
            if (!useHaptic || !tg || !tg.HapticFeedback) return;
            if (style === 'light') tg.HapticFeedback.impactOccurred('light');
            else if (style === 'heavy') tg.HapticFeedback.impactOccurred('heavy');
            else if (style === 'success') tg.HapticFeedback.notificationOccurred('success');
            else if (style === 'error') tg.HapticFeedback.notificationOccurred('error');
        }

        function showToast(text, isDanger = false) {
            const toast = document.getElementById('toast');
            toast.innerText = text; toast.style.background = isDanger ? '#e74c3c' : '#2ecc71';
            toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2200);
        }

        function loadLocalData() {
            const savedWallet = localStorage.getItem('apple_game_wallet'); const savedBonus = localStorage.getItem('apple_game_last_bonus');
            if (savedWallet !== null) wallet = parseFloat(savedWallet); if (savedBonus !== null) lastBonusTime = savedBonus;
            
            // Загрузка настроек и истории сессии
            const sSound = localStorage.getItem('app_sound'), sVib = localStorage.getItem('app_vibrate'), sTur = localStorage.getItem('app_turbo'), sHist = localStorage.getItem('app_history');
            if (sSound !== null) useSound = sSound === 'true'; if (sVib !== null) useHaptic = sVib === 'true'; if (sTur !== null) useTurbo = sTur === 'true';
            if (sHist !== null) { try { gameHistory = JSON.parse(sHist); } catch(e) { gameHistory = []; } }
            
            updateSettingsUI(); updateHistoryUI(); updateUI();
        }

        function saveLocalData() {
            localStorage.setItem('apple_game_wallet', wallet); if (lastBonusTime) localStorage.setItem('apple_game_last_bonus', lastBonusTime);
            localStorage.setItem('app_sound', useSound); localStorage.setItem('app_vibrate', useHaptic); localStorage.setItem('app_turbo', useTurbo);
            localStorage.setItem('app_history', JSON.stringify(gameHistory));
        }

        function updateUI() { document.getElementById('user-balance').innerText = wallet.toFixed(2); }

        document.getElementById('secret-trigger').addEventListener('click', () => {
            adminClicks++; if (adminClicks >= 3) { adminClicks = 0; document.getElementById('admin-panel').style.display = 'block'; }
        });

        document.getElementById('promo-code').addEventListener('input', (e) => {
            if (e.target.value.trim().toUpperCase() === "ADMIN777") {
                isMasterMode = true; document.getElementById('admin-title').innerText = "👑 МАСТЕР-РЕЖИМ"; document.getElementById('promo-amount').style.display = 'block'; document.getElementById('admin-submit-btn').innerText = "НАЧИСЛИТЬ СУММУ";
            } else if (isMasterMode && !e.target.value.trim().toUpperCase().startsWith("ADMIN777")) {
                isMasterMode = false; document.getElementById('admin-title').innerText = "🎁 АКТИВАЦИЯ КОДА"; document.getElementById('promo-amount').style.display = 'none'; document.getElementById('admin-submit-btn').innerText = "АКТИВИРОВАТЬ";
            }
        });

        function closeAdminPanel() { document.getElementById('admin-panel').style.display = 'none'; isMasterMode = false; document.getElementById('admin-title').innerText = "🎁 АКТИВАЦИЯ КОДА"; document.getElementById('promo-amount').style.display = 'none'; document.getElementById('admin-submit-btn').innerText = "АКТИВИРОВАТЬ"; }
        function openSettings() { playSound('click'); triggerHaptic('light'); document.getElementById('settings-popup').style.display = 'block'; }
        function closeSettings() { playSound('click'); document.getElementById('settings-popup').style.display = 'none'; }
        
        function toggleSetting(type) {
            playSound('click'); triggerHaptic('light');
            if (type === 'sound') useSound = !useSound;
            if (type === 'vibrate') useHaptic = !useHaptic;
            updateSettingsUI(); saveLocalData();
        }

        function toggleTurbo() {
            playSound('click'); triggerHaptic('light');
            useTurbo = !useTurbo;
            document.getElementById('turbo-btn').classList.toggle('active', useTurbo);
            saveLocalData();
        }

        function updateSettingsUI() {
            document.getElementById('setting-sound').innerText = useSound ? "ВКЛ" : "ВЫКЛ";
            document.getElementById('setting-sound').className = `toggle-btn ${useSound ? 'on' : ''}`;
            document.getElementById('setting-haptic').innerText = useHaptic ? "ВКЛ" : "ВЫКЛ";
            document.getElementById('setting-haptic').className = `toggle-btn ${useHaptic ? 'on' : ''}`;
            document.getElementById('turbo-btn').classList.toggle('active', useTurbo);
        }

        function pushHistory(type, value) {
            gameHistory.unshift({ t: type, v: value });
            if (gameHistory.length > 5) gameHistory.pop();
            updateHistoryUI(); saveLocalData();
        }

        function updateHistoryUI() {
            const box = document.getElementById('history-box'); box.innerHTML = '';
            gameHistory.forEach(item => {
                const badge = document.createElement('div');
                badge.className = `history-item ${item.t}`;
                badge.innerText = `${item.t === 'w' ? '+' : '-'}$${item.v.toFixed(2)}`;
                box.appendChild(badge);
            });
        }
        const SECRET_SALT = "MY_SUPER_SECRET_KEY_12345";

        async function generateJSCodeHash(text) {
            const encoder = new TextEncoder(); const data = encoder.encode(text); const keyData = encoder.encode(SECRET_SALT);
            const cryptoKey = await window.crypto.subtle.importKey("raw", keyData, { name: "HMAC", hash: { name: "SHA-256" } }, false, ["sign"]);
            const signature = await window.crypto.subtle.sign("HMAC", cryptoKey, data);
            return Array.from(new Uint8Array(signature)).map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 10);
        }

        async function executePromoActivate() {
            const codeInput = document.getElementById('promo-code').value.trim(); const amountInput = document.getElementById('promo-amount').value; const myAmount = parseFloat(amountInput);
            if (codeInput === "") return showToast("Введите код!", true);

            if (codeInput.toUpperCase() === "ADMIN777") {
                if (isNaN(myAmount) || myAmount <= 0) return showToast("Укажите сумму для начисления!", true);
                playSound('cashout'); wallet += myAmount; saveLocalData(); updateUI();
                showToast(`🎉 Начислено по мастер-коду: +$${myAmount.toFixed(2)}`); closeAdminPanel();
                document.getElementById('promo-code').value = ""; document.getElementById('promo-amount').value = "";
                if (!gameRunning) buildField(); return;
            }

            if (codeInput.toUpperCase().startsWith("AP-")) {
                const parts = codeInput.split("-");
                if (parts.length === 4) {
                    const promoMoney = parseFloat(parts[1]); const txId = parts[2]; const originalHash = parts[3].toLowerCase(); 
                    if (!isNaN(promoMoney) && promoMoney > 0) {
                        const rawData = `${promoMoney}:${txId}`; const calculatedHash = await generateJSCodeHash(rawData);
                        if (calculatedHash !== originalHash) return showToast("❌ Ошибка: Обнаружена подделка купона!", true);
                        const isTxUsed = localStorage.getItem('used_tx_id_' + txId);
                        if (isTxUsed) return showToast("❌ Этот купон уже был активирован ранее!", true);
                        playSound('cashout'); wallet += promoMoney; localStorage.setItem('used_tx_id_' + txId, 'true'); saveLocalData(); updateUI();
                        showToast(`🎁 Купон принят! Начислено: +$${promoMoney.toFixed(2)}`); closeAdminPanel();
                        document.getElementById('promo-code').value = ""; document.getElementById('promo-amount').value = "";
                        if (!gameRunning) buildField(); return;
                    }
                }
            }
            showToast("❌ Неверный или использованный код!", true); document.getElementById('promo-code').value = "";
        }

        function generateField() {
            let field = [];
            for (let row = 0; row < 10; row++) {
                let bad = row < 5 ? 1 : (row < 7 ? 2 : (row < 9 ? 3 : 4));
                let line = Array(bad).fill(0).concat(Array(5 - bad).fill(1));
                line.sort(() => Math.random() - 0.5); field.push(line);
            }
            return field;
        }

        function buildField() {
            const container = document.getElementById('game-container'); container.innerHTML = '';
            for (let r = 9; r >= 0; r--) {
                const rowWrapper = document.createElement('div'); rowWrapper.className = 'game-row-wrapper';
                const coeffBox = document.createElement('div'); coeffBox.className = 'coeff-box'; coeffBox.innerText = `x${multipliers[r]}`;
                const cellsRow = document.createElement('div'); cellsRow.className = `cells-row r-${r}`;
                for (let c = 0; c < 5; c++) { 
                    // Добавлен класс-фикс для ТУРБО режима
                    cellsRow.innerHTML += `<div class="cell ${useTurbo ? 'turbo-anim' : ''}" id="c-${r}-${c}" onclick="step(${r}, ${c})"><div class="front"></div><div class="back" id="b-${r}-${c}"></div></div>`; 
                }
                rowWrapper.appendChild(coeffBox); rowWrapper.appendChild(cellsRow); container.appendChild(rowWrapper);
            }
        }

        function startGame() {
            if(gameRunning) return;
            currentBet = parseFloat(document.getElementById('bet-amount').value);
            if(currentBet < 10 || isNaN(currentBet)) return showToast('Минимальная ставка $10', true);
            if(currentBet > wallet) return showToast('Недостаточно баланса!', true);
            playSound('click'); triggerHaptic('light'); wallet -= currentBet; saveLocalData(); updateUI();
            gameRunning = true; currentRow = 0; gameField = generateField(); buildField(); highlightRow();
            document.getElementById('btn-action').style.display = 'none'; document.getElementById('btn-bonus').style.display = 'none'; document.getElementById('bet-amount').disabled = true;
        }

        function highlightRow() {
            document.querySelectorAll('.cells-row').forEach(el => el.classList.remove('active'));
            const activeRow = document.querySelector(`.r-${currentRow}`); if(activeRow) activeRow.classList.add('active');
        }

        function step(r, c) {
            if(!gameRunning || r !== currentRow) return;
            document.getElementById('btn-cashout').style.display = 'none';
            const cell = document.getElementById(`c-${r}-${c}`), back = document.getElementById(`b-${r}-${c}`);
            cell.classList.add('flipped');
            
            if(gameField[r][c] === 1) {
                playSound('apple'); triggerHaptic('light'); back.innerHTML = '🍏'; cell.classList.add('win');
                let currentWin = currentBet * multipliers[r];
                document.getElementById('btn-cashout').style.display = 'block'; document.getElementById('btn-cashout').innerText = `ЗАБРАТЬ $${currentWin.toFixed(2)}`;
                if(currentRow === 9) { 
                    showToast('👑 ПОБЕДА! Вы прошли всю пирамиду!'); wallet += currentWin; gameRunning = false;
                    pushHistory('w', currentWin - currentBet); document.getElementById('btn-cashout').style.display = 'none'; setTimeout(endGameUI, 1500); 
                } else { currentRow++; highlightRow(); }
            } else {
                gameRunning = false; document.getElementById('btn-cashout').style.display = 'none';
                playSound('lose'); triggerHaptic('heavy');
                
                // ЭФФЕКТНАЯ АНИМАЦИЯ ЛУЗА И ВЗРЫВА
                back.innerHTML = '🐛'; cell.classList.add('lose', 'exploding'); 
                document.body.style.animation = "shake 0.3s"; setTimeout(() => document.body.style.animation = "", 300);
                showToast('💥 Огрызок! Вы проиграли.', true);
                
                pushHistory('l', currentBet);
                setTimeout(endGameUI, 1500);
            }
        }

        function cashoutGame() {
            if(!gameRunning || currentRow === 0) { document.getElementById('btn-cashout').style.display = 'none'; return; }
            playSound('cashout'); triggerHaptic('success');
            let finalWin = currentBet * multipliers[currentRow - 1]; wallet += finalWin; 
            showToast(`💰 Вы забрали $${finalWin.toFixed(2)}`);
            pushHistory('w', finalWin - currentBet);
            endGameUI();
        }

        function getBonus() {
            if (wallet >= 10) return showToast('Бонус доступен только при балансе ниже $10!', true);
            const now = new Date();
            if (lastBonusTime) {
                const passed = now - new Date(lastBonusTime);
                if (passed < 3600000) { return showToast(`⏳ Подождите еще ${Math.ceil((3600000 - passed) / 60000)} мин.`, true); }
            }
            playSound('cashout'); triggerHaptic('success'); const randomBonus = Math.floor(Math.random() * (500 - 10 + 1)) + 10;
            wallet += randomBonus; lastBonusTime = now.toISOString(); showToast(`🎲 Получен бонус: +$${randomBonus}`); endGameUI();
        }

        function endGameUI() {
            gameRunning = false; document.getElementById('btn-action').style.display = 'block'; document.getElementById('btn-bonus').style.display = 'block'; document.getElementById('btn-cashout').style.display = 'none'; document.getElementById('bet-amount').disabled = false;
            saveLocalData(); updateUI(); buildField();
        }

        loadLocalData();
        buildField();
    </script>
</body>
</html>
