<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Сити-Курьер: Офисный Драйв</title>
    <script src="https://telegram.org"></script>
    <style>
        body { margin: 0; padding: 10px; background-color: #1a1a1e; font-family: 'Segoe UI', sans-serif; color: #fff; text-align: center; user-select: none; }
        .ui-panel { background: #25252b; padding: 12px; margin: 0 auto 10px auto; width: 300px; border-radius: 10px; display: flex; justify-content: space-around; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.4); align-items: center; border: 1px solid #3a3a45; }
        .money { color: #f1c40f; text-shadow: 0 0 5px rgba(241,196,15,0.3); }
        
        .timer-container { font-size: 14px; color: #e74c3c; background: rgba(231, 76, 60, 0.1); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(231, 76, 60, 0.3); }
        .timer-danger { animation: blink 0.5s infinite alternate; color: #ff4757; font-weight: bold; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.4; } }
        .restart-btn { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }
        
        #maze-grid { display: grid; grid-template-columns: repeat(10, 32px); grid-template-rows: repeat(10, 32px); gap: 0px; justify-content: center; margin: 10px auto; background: #2c3e50; padding: 6px; border-radius: 12px; width: 320px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); border: 2px solid #34495e; }
        .cell { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .W { background: #7f8c8d; position: relative; } 
        .W::after { content: "🏢"; font-size: 16px; position: absolute; }
        .E { background: #34495e; border: 1px solid #2c3e50; } 
        .T { background: #27ae60; position: relative; } 
        .T::after { content: "🌳"; font-size: 16px; position: absolute; }
        
        #toast { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: top 0.4s; z-index: 1000; font-size: 13px; }
        #toast.show { top: 20px; }
        .controls { display: grid; grid-template-columns: repeat(3, 62px); grid-template-rows: repeat(2, 62px); gap: 10px; justify-content: center; margin-top: 12px; }
        .btn { background: #2c3e50; color: white; border: none; border-radius: 14px; font-size: 24px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px #1a252f; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 #1a252f; }
        .btn-up { grid-column: 2; } .btn-left { grid-column: 1; grid-row: 2; } .btn-down { grid-column: 2; grid-row: 2; } .btn-right { grid-column: 3; grid-row: 2; }
        .shop-container { background: #25252b; width: 300px; margin: 15px auto; padding: 12px; border-radius: 10px; text-align: left; border: 1px solid #3a3a45; }
        .shop-title { font-size: 15px; font-weight: bold; color: #f1c40f; border-bottom: 1px solid #3a3a45; padding-bottom: 6px; margin-bottom: 10px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #3a3a45; }
        .buy-btn { background: #2ecc71; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { background: #454552; color: #7a7a8a; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="toast">Заказ принят! 📦</div>

    <div class="ui-panel">
        <div>💵 Выручка: <span id="money-txt" class="money">0</span>$</div>
        <div class="timer-container">⏱️ <span id="timer-txt">15</span>с</div>
        <button class="restart-btn" onclick="triggerRestart()">🚕 Район</button>
    </div>

    <div id="maze-grid"></div>

    <div class="controls">
        <button class="btn btn-up" onclick="move(0, -1)">▲</button>
        <button class="btn btn-left" onclick="move(-1, 0)">◀</button>
        <button class="btn btn-down" onclick="move(0, 1)">▼</button>
        <button class="btn btn-right" onclick="move(1, 0)">▶</button>
    </div>

    <div class="shop-container">
        <div class="shop-title">🏪 Автосалон и Снаряжение</div>
        <div class="shop-item">
            <div>
                <div style="font-weight:bold;">🔑 Мастер-Ключ</div>
                <div style="font-size:11px; color:#aaa;">Снос здания кликом</div>
            </div>
            <button class="buy-btn" id="buy-tool" onclick="buyTool()">50$</button>
        </div>
        <div class="shop-item">
            <div>
                <div style="font-weight:bold;">🏃‍♂️ Быстрый Курьер</div>
                <div style="font-size:11px; color:#aaa;">Сменить транспорт на бег</div>
            </div>
            <button class="buy-btn" id="buy-skin" onclick="buyItem('skin', 150, '🏃‍♂️')">150$</button>
        </div>
    </div>
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg && typeof tg.expand === 'function') tg.expand();

        let wallet = 0;
        let toolsCount = 0;
        let p = { x: 1, y: 1 };
        let currentSkin = '🚴'; 
        let currentMap = [];
        let timeLeft = 15; 
        let timerInterval = null; 

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'step') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'coin') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            } else if (type === 'tick') {
                osc.type = 'square'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        // ЖЕСТКАЯ, ОПТИМИЗИРОВАННАЯ КАРТА ГОРОДА (Защита от сбоев чтения undefined)
        const fixedMap = [
            ['W','W','W','W','W','W','W','W','W','W'],
            ['W','E','M','E','T','E','E','M','E','W'],
            ['W','E','W','W','E','W','W','E','W','W'],
            ['W','M','E','E','E','E','T','E','E','W'],
            ['W','W','T','W','W','E','W','W','M','W'],
            ['W','E','E','E','M','E','E','T','E','W'],
            ['W','E','W','W','E','W','W','E','W','W'],
            ['W','M','E','T','E','E','M','E','E','W'],
            ['W','E','E','E','E','T','E','E','F','W'],
            ['W','W','W','W','W','W','W','W','W','W']
        ];

        function generateLevel() {
            currentMap = JSON.parse(JSON.stringify(fixedMap));
            p = { x: 1, y: 1 };
            resetTimer();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                const timerTxt = document.getElementById('timer-txt');
                if (timerTxt) {
                    timerTxt.innerText = timeLeft;
                    if (timeLeft <= 5) {
                        timerTxt.parentElement.classList.add('timer-danger');
                        playSound('tick');
                    } else {
                        timerTxt.parentElement.classList.remove('timer-danger');
                    }
                }
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showToast("⏰ Дедлайн провален! Перезапуск района.", "#e74c3c");
                    setTimeout(() => { generateLevel(); draw(); }, 1200);
                }
            }, 1000);
        }

        function resetTimer() {
            timeLeft = 15;
            const timerTxt = document.getElementById('timer-txt');
            if (timerTxt) {
                timerTxt.innerText = timeLeft;
                timerTxt.parentElement.classList.remove('timer-danger');
            }
            startTimer();
        }

        function draw() {
            const container = document.getElementById('maze-grid');
            if (!container) return;
            container.innerHTML = '';
            for (let y = 0; y < 10; y++) {
                for (let x = 0; x < 10; x++) {
                    const cell = document.createElement('div');
                    let type = currentMap[y][x];
                    cell.className = 'cell ' + (type === 'M' || type === 'F' ? 'E' : type);
                    cell.onclick = () => breakWall(x, y);
                    if (x === p.x && y === p.y) {
                        cell.innerText = currentSkin;
                    } else if (type === 'M') {
                        cell.innerText = '💵';
                    } else if (type === 'F') {
                        cell.innerText = '🏁';
                    }
                    container.appendChild(cell);
                }
            }
            updateShop();
        }

        function triggerRestart() {
            generateLevel();
            draw();
            showToast("🚕 Сменили район города!", "#3498db");
        }

        function breakWall(x, y) {
            if ((currentMap[y][x] === 'W' || currentMap[y][x] === 'T') && x > 0 && x < 9 && y > 0 && y < 9) {
                if (toolsCount > 0) {
                    toolsCount--;
                    currentMap[y][x] = 'E';
                    showToast("🧱 Квартал расчищен!");
                    draw();
                    saveLocalData();
                } else {
                    showToast("❌ Нужен Мастер-Ключ!", "#e74c3c");
                }
            }
        }

        function showToast(text, color = "#2ecc71") {
            const toast = document.getElementById('toast');
            if (toast) {
                toast.innerText = text; toast.style.background = color; toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 1200);
            }
        }

        function move(dx, dy) {
            let nx = p.x + dx; let ny = p.y + dy;
            if (currentMap[ny] && currentMap[ny][nx] !== 'W' && currentMap[ny][nx] !== 'T') {
                p.x = nx; p.y = ny;
                playSound('step');
                if (currentMap[p.y][p.x] === 'M') {
                    wallet += 50; currentMap[p.y][p.x] = 'E';
                    document.getElementById('money-txt').innerText = wallet;
                    showToast("💵 Посылка подобрана! +50$"); playSound('coin');
                    saveLocalData();
                }
                if (currentMap[p.y][p.x] === 'F') {
                    wallet += 100; document.getElementById('money-txt').innerText = wallet;
                    showToast("🏁 Доставили вовремя! +100$"); playSound('coin');
                    generateLevel();
                    saveLocalData();
                }
                draw();
            }
        }

        function buyTool() {
            if (wallet >= 50) {
                wallet -= 50; toolsCount++;
                document.getElementById('money-txt').innerText = wallet;
                showToast("🔑 Получен Мастер-Ключ!");
                updateShop(); saveLocalData();
            }
        }

        function buyItem(id, price, emoji) {
            if (wallet >= price) {
                wallet -= price; document.getElementById('money-txt').innerText = wallet;
                currentSkin = emoji; localStorage.setItem('courier_skin_bought', 'true');
                document.getElementById(`buy-${id}`).innerText = "Одето";
                document.getElementById(`buy-${id}`).disabled = true;
                showToast("💼 Имидж курьера обновлен!");
                draw(); saveLocalData();
            }
        }

        function updateShop() {
            const b1 = document.getElementById('buy-tool'); const b2 = document.getElementById('buy-skin');
            if (b1) b1.disabled = wallet < 50;
            if (b2) b2.disabled = wallet < 150 && b2.innerText !== "Одето";
        }

        function loadLocalData() {
            wallet = parseInt(localStorage.getItem('courier_wallet')) || 0;
            toolsCount = parseInt(localStorage.getItem('courier_tools')) || 0;
            currentSkin = localStorage.getItem('courier_skin') || '🚴';
            document.getElementById('money-txt').innerText = wallet;
            if (localStorage.getItem('courier_skin_bought') === 'true') {
                const b2 = document.getElementById('buy-skin'); if (b2) { b2.innerText = "Одето"; b2.disabled = true; }
            }
            generateLevel();
            draw();
        }

        function saveLocalData() {
            localStorage.setItem('courier_wallet', wallet);
            localStorage.setItem('courier_tools', toolsCount);
            localStorage.setItem('courier_skin', currentSkin);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'ц') move(0, -1);
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'ы') move(0, 1);
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ф') move(-1, 0);
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'в') move(1, 0);
        });

        setInterval(saveLocalData, 2000);
        loadLocalData();
    </script>
</body>
</html>
