<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Офисный Курьер</title>
    <script src="https://telegram.org"></script>
    <style>
        body { margin: 0; padding: 10px; background-color: #1e1e24; font-family: sans-serif; color: #fff; text-align: center; user-select: none; }
        .ui-panel { background: #2a2a35; padding: 10px; margin: 0 auto 10px auto; width: 300px; border-radius: 8px; display: flex; justify-content: space-around; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .money { color: #f1c40f; } .level { color: #3498db; }
        
        #maze-grid { display: grid; grid-template-columns: repeat(10, 30px); grid-template-rows: repeat(10, 30px); gap: 1px; justify-content: center; margin: 10px auto; background: #111116; padding: 5px; border-radius: 8px; width: 310px; }
        .cell { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 18px; border-radius: 3px; }
        .W { background: #34495e; } 
        .E { background: #1a1a20; } 

        .controls { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px); gap: 8px; justify-content: center; margin-top: 10px; }
        .btn { background: #34495e; color: white; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px #2c3e50; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 #2c3e50; }
        .btn-up { grid-column: 2; } .btn-left { grid-column: 1; grid-row: 2; } .btn-down { grid-column: 2; grid-row: 2; } .btn-right { grid-column: 3; grid-row: 2; }

        .shop-container { background: #2a2a35; width: 300px; margin: 15px auto; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: left; }
        .shop-title { font-size: 16px; font-weight: bold; color: #f1c40f; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; }
        .shop-item:last-child { border-bottom: none; }
        .item-info { font-size: 14px; } .item-name { font-weight: bold; } .item-desc { font-size: 11px; color: #aaa; }
        .buy-btn { background: #2ecc71; color: #fff; border: none; padding: 6px 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .buy-btn:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div>💵 Баксы: <span id="money-txt" class="money">0</span>$</div>
        <div>📍 Офис: <span id="level-txt" class="level">1</span></div>
    </div>

    <div id="maze-grid"></div>

    <div class="controls">
        <button class="btn btn-up" onclick="move(0, -1)">▲</button>
        <button class="btn btn-left" onclick="move(-1, 0)">◀</button>
        <button class="btn btn-down" onclick="move(0, 1)">▼</button>
        <button class="btn btn-right" onclick="move(1, 0)">▶</button>
    </div>

    <div class="shop-container">
        <div class="shop-title">🎒 Магазин курьера</div>
        <div class="shop-item">
            <div class="item-info">
                <div class="item-name">👟 Брендовые Кроссовки</div>
                <div class="item-desc">Скин быстрого бегуна</div>
            </div>
            <button class="buy-btn" id="buy-skin" onclick="buyItem('skin', 150, '🏃‍♂️')">150$</button>
        </div>
        <div class="shop-item">
            <div class="item-info">
                <div class="item-name">🛴 Электросамокат</div>
                <div class="item-desc">Быстрая езда по офису</div>
            </div>
            <button class="buy-btn" id="buy-scooter" onclick="buyItem('scooter', 300, '🛴')">300$</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let wallet = 0;
        let level = 1;
        let p = { x: 1, y: 1 };
        let currentSkin = '🚴'; 

        const maps = {
            1: [
                ['W','W','W','W','W','W','W','W','W','W'],
                ['W','E','E','W','M','E','E','E','M','W'],
                ['W','W','E','W','E','W','W','W','E','W'],
                ['W','E','E','E','E','E','E','W','E','W'],
                ['W','E','W','W','W','W','E','W','E','W'],
                ['W','M','W','E','E','E','E','E','E','W'],
                ['W','E','W','E','W','W','W','W','E','W'],
                ['W','E','E','E','W','M','E','E','E','W'],
                ['W','W','W','E','E','E','W','E','F','W'],
                ['W','W','W','W','W','W','W','W','W','W']
            ]
        };

        let currentMap = JSON.parse(JSON.stringify(maps[1]));

        function draw() {
            const container = document.getElementById('maze-grid');
            container.innerHTML = '';
            
            for (let y = 0; y < 10; y++) {
                for (let x = 0; x < 10; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell ' + currentMap[y][x];
                    
                    if (x === p.x && y === p.y) {
                        cell.innerText = currentSkin;
                    } else if (currentMap[y][x] === 'M') {
                        cell.innerText = '💵';
                    } else if (currentMap[y][x] === 'F') {
                        cell.innerText = '🏢';
                    }
                    container.appendChild(cell);
                }
            }
            updateShop();
        }

        function move(dx, dy) {
            let nx = p.x + dx;
            let ny = p.y + dy;

            if (currentMap[ny] && currentMap[ny][nx] !== 'W') {
                p.x = nx;
                p.y = ny;

                if (currentMap[p.y][p.x] === 'M') {
                    wallet += 50;
                    currentMap[p.y][p.x] = 'E';
                    document.getElementById('money-txt').innerText = wallet;
                }

                if (currentMap[p.y][p.x] === 'F') {
                    alert("Посылка доставлена! Заработок +100$");
                    wallet += 100;
                    document.getElementById('money-txt').innerText = wallet;
                    currentMap = JSON.parse(JSON.stringify(maps[1])); 
                    p = { x: 1, y: 1 };
                }
                draw();
            }
        }

        function buyItem(id, price, emoji) {
            if (wallet >= price) {
                wallet -= price;
                document.getElementById('money-txt').innerText = wallet;
                currentSkin = emoji;
                document.getElementById(`buy-${id}`).innerText = "Одето";
                document.getElementById(`buy-${id}`).disabled = true;
                draw();
            }
        }

        function updateShop() {
            document.getElementById('buy-skin').disabled = wallet < 150 && document.getElementById('buy-skin').innerText !== "Одето";
            document.getElementById('buy-scooter').disabled = wallet < 300 && document.getElementById('buy-scooter').innerText !== "Одето";
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'ц') move(0, -1);
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'ы') move(0, 1);
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ф') move(-1, 0);
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'в') move(1, 0);
        });

        draw();
    </script>
</body>
</html>
